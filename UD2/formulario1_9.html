<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width, 
    initial-scale=1.0">
    <title>formmulario1_9</title>
</head>
<body>
    <h1>Login</h1>
    <form>
        <!--action="login.php" method="post"--> 
        <label for="correo">Email</label>
        <input type="email" required id="correo" name="email" placeholder="nombre@correo.com">

        <label for="alias">Alias de usuario</label>
        <input type="text" id="alias" name="alias" maxlength="10"
        required
        pattern="[a-zA-Z0-9]{5-10}">

        <label for="password">Contraseña</label>
        <input type="password"  id="password" name="password" 
        placeholder="***********" maxlength="8"
        required
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])">
        <input type="submit" value="iniciar sesion" >
    </form>

</body>
</html>
