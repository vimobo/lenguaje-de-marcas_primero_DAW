<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Selectores CSS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1 class="titulo">Bienvenidos a CSS</h1>

  <p>Este es un párrafo normal.</p>
  <p class="destacado">Este es un párrafo destacado.</p>
  <p id="peque">Este es un texto pequeño.</p>

  <input type="text" placeholder="Nombre">
  <input type="password" placeholder="Contraseña">

  <div class="card">
    <p>Tarjeta sin imagen</p>
  </div>

  <div class="card">
    <img src="img/avatar.png" alt="imagen">
    <p>Tarjeta con imagen</p>
  </div>

  <button>Enviar</button>
  <button class="disabled">Cancelar</button>

</body>
</html>
